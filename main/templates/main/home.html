{% extends "main/layouts/base.html" %}

{% load static %}

{% block title %}Home{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}

<h1>Jason Craig</h1>
<p class="tagline">Digital Artist</p>

<!-- 1. Контейнер с плитками -->
<div class="tiles-scene" id="tilesScene">
  <div class="tiles-wrap" id="tilesWrap"></div>
  <button class="explore-btn" id="exploreBtn">EXPLORE</button>
</div>

<!-- 2. Меню после разлёта -->
<nav class="shatter-nav" id="shatterNav">
  <a href="{% url 'about' %}">About Me</a>
  <a href="{% url 'work' %}">Work</a>
  <a href="{% url 'exhibitions' %}">Exhibitions</a>
  <a href="{% url 'blog' %}">Blog</a>
  <a href="{% url 'contact' %}">Contact</a>
  <button class="shatter-back" id="shatterBack">← Back</button>
</nav>

<div class="social__networks">

</div>


<div class="all_rights">
    © 2026 CHINT All rights reserved.
</div>


<script>
(function () {

  const CONFIG = {
    imageUrl:        'https://themes.pixelwars.org/artflow/demo-01/wp-content/uploads/sites/2/2023/06/artist-02-1060x1060.jpg',
    cols:            6,
    rows:            6,
    scatterOpacity:  0.32,
    scatterScale:    1.8,
    scatterRot:      99,
    navDelay:        450,
    delayMax:        0.5,
    scatterDuration: '0.8s cubic-bezier(0.55, 0, 1, 0.45)',
    assembleDuration:'0.65s cubic-bezier(0.18, 0.89, 0.32, 1.28)',
  };

  const scene      = document.getElementById('tilesScene');
  const wrap       = document.getElementById('tilesWrap');
  const exploreBtn = document.getElementById('exploreBtn');
  const nav        = document.getElementById('shatterNav');
  const backBtn    = document.getElementById('shatterBack');

  const { cols, rows, imageUrl } = CONFIG;
  const W = scene.offsetWidth;
  const H = scene.offsetHeight;

  if (!W || !H) {
    console.warn('tiles-scene имеет нулевой размер. Проверь home.css → .tiles-scene { width/height }');
    return;
  }

  const tW = W / cols;
  const tH = H / rows;

  const sceneRect = scene.getBoundingClientRect();
  const sceneCX   = sceneRect.left + W / 2;
  const sceneCY   = sceneRect.top  + H / 2;

  /* ── СОЗДАНИЕ ПЛИТОК ── */
  const tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'tile';
      Object.assign(el.style, {
        left:              `${c * tW}px`,
        top:               `${r * tH}px`,
        width:             `${tW}px`,
        height:            `${tH}px`,
        backgroundImage:   `url('${imageUrl}')`,
        backgroundSize:    `${W}px ${H}px`,
        backgroundPosition:`-${c * tW}px -${r * tH}px`,
      });
      el._cx = c - (cols - 1) / 2;
      el._cy = r - (rows - 1) / 2;
      wrap.appendChild(el);
      tiles.push(el);
    }
  }

  let isScattered = false;

  /* ── РАЗЛЁТ ── */
  function scatter() {
    isScattered = true;
    exploreBtn.classList.add('hidden');

    const vW = window.innerWidth;
    const vH = window.innerHeight;
    const maxDist = Math.sqrt(
      Math.pow(Math.max(sceneCX, vW - sceneCX), 2) +
      Math.pow(Math.max(sceneCY, vH - sceneCY), 2)
    );

    tiles.forEach(tile => {
      const angle = Math.atan2(tile._cy, tile._cx) + (Math.random() - 0.5) * 0.7;
      const dist  = maxDist * (0.4 + Math.random() * 0.6);
      const tx    = Math.cos(angle) * dist;
      const ty    = Math.sin(angle) * dist;
      const rot   = (Math.random() - 0.5) * CONFIG.scatterRot * 2;
      const delay = Math.random() * CONFIG.delayMax;

      tile.style.transition      = `transform ${CONFIG.scatterDuration}, opacity 0.6s ease`;
      tile.style.transitionDelay = `${delay}s`;
      tile.style.transform       = `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(${CONFIG.scatterScale})`;
      tile.style.opacity         = String(CONFIG.scatterOpacity);
    });

    setTimeout(() => nav.classList.add('visible'), CONFIG.navDelay);
  }

  /* ── СБОРКА ОБРАТНО ── */
  function assemble() {
    isScattered = false;
    nav.classList.remove('visible');

    tiles.forEach(tile => {
      const delay = Math.random() * CONFIG.delayMax * 1.5;
      tile.style.transition      = `transform ${CONFIG.assembleDuration}, opacity 0.4s ease`;
      tile.style.transitionDelay = `${delay}s`;
      tile.style.transform       = 'translate(0,0) rotate(0deg) scale(1)';
      tile.style.opacity         = '1';
    });

    setTimeout(() => {
      tiles.forEach(t => {
        t.style.transition      = `transform ${CONFIG.scatterDuration}, opacity 0.6s ease`;
        t.style.transitionDelay = '0s';
      });
      exploreBtn.classList.remove('hidden');
    }, 750);
  }

  exploreBtn.addEventListener('click', () => { if (!isScattered) scatter(); });
  backBtn.addEventListener('click', assemble);

})();
</script>

{% endblock %}
